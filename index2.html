<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Pastgift</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        padding: 0;
        margin: 0;
        min-height: 100%;
        background-color: black;
      }
      a {
        text-decoration: none;
        color: grey;
        font-size: 12px;
      }
      p {
        text-align: center;
        line-height: 1.5;
        width: 100%;
        margin-bottom: 0;
      }
      #dream {
        min-height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 25px;
        color: grey;
        position: relative;
        padding: 24px;
      }
      #beian {
        position: absolute;
        right: 3px;
        bottom: 3px;
      }
      @media (max-width: 767px) {
        #dream {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div id="dream">
      <p>
        <br>
        如果你正在读这段话，<br>
        你已经昏迷快20年了。
      </p>
      <p>
        我们现在正在尝试新的治疗方案。<br>
        我们不知道这段信息会出现在你梦境的哪里，<br>
        但是我们真心希望你可以看到。<br>
      </p>
      <p>
        请快醒来！
        <br>
      </p>

      <div id="beian">
        <a href="https://beian.miit.gov.cn" rel="noopener noreferrer">苏ICP备16060547号-1</a>
      </div>
    </div>
  </body>
</html>
